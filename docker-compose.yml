services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: typescript-boilerplate:dev
    volumes:
      - .:/app
      - pnpm-store:/home/node/.pnpm-store
    working_dir: /app
    command: sleep infinity
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    user: node
    stdin_open: true
    tty: true
    healthcheck:
      # The dev container just sleeps (devs exec into it) — "healthy" here
      # means pnpm is installed and reachable, not that a server is up.
      # `command -v` (PATH lookup only) instead of `pnpm --version`: the
      # latter runs from /app, whose package.json pins a "packageManager"
      # version, triggering pnpm's auto-install-matching-version feature
      # (a real network call) on every healthcheck tick — unnecessary and
      # can flake on restricted networks.
      test: ["CMD-SHELL", "command -v pnpm"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pnpm-store:
