name: CI

on:
  push:
  pull_request:

# Least privilege: the workflow only needs to read the repo contents.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: make validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version resolved from the "packageManager" field in package.json —
      # do not pin a version here, it conflicts with that field.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Wraps the repo's own command: lock-check (frozen install) → typecheck
      # → test:coverage → build → audit → check-docs. No new toolchain.
      - name: Validate
        run: make validate
