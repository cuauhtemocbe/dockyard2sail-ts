sonar.projectKey=dockyard2sail-ts
sonar.projectName=Dockyard2Sail TypeScript Boilerplate
sonar.projectVersion=1.0
sonar.language=ts
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.spec.ts
sonar.exclusions=**/*.test.ts,**/*.spec.ts,**/node_modules/**,**/dist/**,**/coverage/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/main.ts,**/setup.ts
